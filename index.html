<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Attendance | Target Plus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

<div class="main-wrapper">
  <img src="img.png" class="logo-img" alt="Logo">
  
  <marquee scrollamount="4">
    <h2>🎯 
WsCube Career School - Jaipur Future-proof your career with Gen AI Skill Call us : 9257155617</h2>
  </marquee>
 
  <h2>📍 <b>Smart Attendance</b></h2>

  <div id="loginSection">
    <input type="text" id="regInput" placeholder="Enter Registration ID">
    <button class="login-btn" onclick="saveAndProceed()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>
    
    <div class="secondary-btns">
      <a href="https://sunildhawan12.github.io/addStudents/" class="small-link">
        New here? <span class="create-text">Create Account</span>
      </a>
      
      <a href="https://sunildhawan12.github.io/Adimn-p/" class="small-link">
        <i class="fas fa-user-shield"></i> Admin Panel
      </a>
    </div>
  </div>

  <div id="attendanceSection" style="display: none;">
    <p id="statusMsg">📡 Fetching your current location...</p>
    <button id="outBtn" class="out-btn" onclick="manualOut()">
      <i class="fas fa-sign-out-alt"></i> MARK OUT NOW
    </button>
    
    <button class="history-btn" onclick="showHistory()">
      <i class="fas fa-history"></i> Attendance History
    </button>
  </div>

  <div id="loaderMsg" style="margin-top:15px;"></div>

  <div id="historyModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 9999; padding: 15px;">
    <div class="modal-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0; color: var(--accent);"><i class="fas fa-list-ul"></i> Attendance Log</h3>
        <input type="date" id="filterDate" onchange="renderHistoryTable(historyData)" style="padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>
      </div>

      <button onclick="document.getElementById('historyModal').style.display='none'" style="margin-top: 25px; background: #2d3436; color: white; padding: 14px; border-radius: 12px; width: 100%;">
        Close Log
      </button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
